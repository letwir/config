########################
# tumx - config
#   # default prefix
#   C-d - プレフィックスキー
#   prefix + | - 縦分割
#   prefix + - - 横分割
#   Shift + 矢印キー - プレフィックスなしで画面移動
#   prefix + e - 並列実行のトグル
#   prefix + m - マウス操作のトグル
#   prefix +  -
#   prefix +  -
#   prefix +  -
#   prefix +  -
#   prefix +  -
#   # tmux-plugins/tpm
#   prefix + S-I - プラグインのインストール
#   prefix + S-U - プラグインのアップデート(allと入力)
#   # tmux-plugins/tmux-yank
#   y - 選択をコピー
#   C-y - 貼り付け
#   S-y - コマンドラインに直接貼り付け
#   prefix+S-y - 今の入力をコピーする
#   # tmux-plugins/tmux-resurrect
#   prefix + C-s - 保存
#   prefix + C-r - 復元
#   # tmux-plugins/tmux-copycat
#   prefix + / - 正規表現検索
#   prefix + ctrl-f - ファイル検索
#   prefix + ctrl-g - gitステータスファイル
#   prefix + alt-h - SHA-1/SHA-256ハッシュ
#   prefix + ctrl-u - URL検索
#   prefix + ctrl-d - 数値検索
#   prefix + alt-i - IPアドレス検索
#   # tmux-plugins/tmux-open
#   prefix + o - 選択したURLを開く
#   prefix + S-o - 選択したエディタを開く
#   prefix + S-s - 選択したテキストをWeb検索する
########################

# プラグイン
## プラグインモジュール
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
## クリップボード連携するやつ(yankなのでプレフィックスはy。)
set -g @plugin 'tmux-plugins/tmux-yank'
# tmux環境の保存と復元
set -g @plugin 'tmux-plugins/tmux-resurrect'
# 表示内容を正規表現で検索
set -g @plugin 'tmux-plugins/tmux-copycat'
# ハイライトしているファイルやURLを開く
set -g @plugin 'tmux-plugins/tmux-open'
# 機能追加 & テーマ
set -g @plugin 'letwir/tmux-power'
set -g @plugin 'wfxr/tmux-net-speed'


# キーの割り当て変更
## prefixキーの割り当て(Ctr+d)
set -g prefix C-d
unbind C-b
## prefix + |で垂直分割
bind | split-window -h
## prefix + -で水平分割
bind - split-window -v
## ペインの移動をprefixなしで行う（Shift + 矢印キー）
bind -n S-left select-pane -L
bind -n S-down select-pane -D
bind -n S-up select-pane -U
bind -n S-right select-pane -R
## ペインの順次移動をCtr + o に設定
#bind -n C-o select-pane -t :.+
## 並列実行のトグル化
bind e setw synchronize-panes \; display "synchronize-panes #{?pane_synchronized,on,off}"


# 基本設定
## 256色端末を使用する
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
## Escキーの遅延を解消
set -s escape-time 0
## status line を更新する間隔を1秒にする
set -g status-interval 1
## ウィンドウのインデックスを1から始める
set -g base-index 1
## ペインのインデックスを1から始める
setw -g pane-base-index 1
## クリップボードを有効にする
#set -g clipboard on
## アクティブなペインのみ白っぽく変更（真っ黒は232）
#set -g window-style 'bg=colour239'
#set -g window-active-style 'bg=colour234'



# status lineの設定
## window-status を中央揃えで配置する
#set-option -g status-justify "centre"
set -g status-justify "left"
## status line の背景色を指定する。
#set-option -g status-bg "colour238"
## status line の文字色を指定する。
#set-option -g status-fg "colour255"

## window-status のフォーマットを指定する。
set-window-option -g window-status-format " #I: #W "
## カレントウィンドウの window-status のフォーマットを指定する
#set-window-option -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #W #[default]"
set-window-option -g window-status-current-format " #I: #W"

# status ◀
## status-left の最大の長さを指定する。
set -g status-left-length 20
## status-left のフォーマットを指定する。
#set-option -g status-left "#[fg=colour255,bg=colour241]Session: #S #[default]"
set -g status-left "S: #S"

# status ▶
## status-right の最大の長さを指定する。
set -g status-right-length 60
## status-right のフォーマットを指定する。
#set-option -g status-right "#[fg=colour255,bg=colour241] #h | LA: #(cut -d' ' -f-3 /proc/loadavg)|#(MEM=`cat /proc/meminfo|head -n2|tail -n1`) | %Y年%m月%d日 %A %H:%M:%S#[default]"
set -g status-right "💻: #(cut -d' ' -f-3 /proc/loadavg)|#(MEM=`cat /proc/meminfo|head -n2|tail -n1`) | %Y年%m月%d日 %A %H:%M:%S"


# 操作系
## マウス関連（デフォルトはOFFにしておいて、prefix+mで切替える）https://qiita.com/kawaz/items/7b15e18ca8e072c1dc57
set-option -g mouse on
bind-key m if-shell "tmux show-options -g mouse | grep off" "set-option -g mouse on" "set-option -g mouse off"

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

bind -n S-WheelUpPane send-keys up
bind -n S-WheelDownPane send-keys down


# プラグイン設定
## openURL
#set -g @open 'o' # キーを変更
set -g @open-editor 'S-o' # エディタのキー変更
set -g @open-S 'S-s' # Web検索のキー変更

set -g @open-S 'https://www.google.com/search?q='
## クリップボートとの連携
### デフォルト
set -g @yank_selection 'clipboard' # 'primary', 'secondary' or 'clipboard'

### マウス
set -g @yank_with_mouse on
set -g @yank_selection_mouse 'clipboard' # 'primary', 'secondary' or 'clipboard'

## Tmux Power
# 色設定
set -g @tmux_power_theme 'forest'
set -g @tmux_power_date_icon           ' '
set -g @tmux_power_time_icon           ' '
set -g @tmux_power_user_icon           ' '
set -g @tmux_power_session_icon        ' '
set -g @tmux_power_right_arrow_icon    ''
set -g @tmux_power_left_arrow_icon     ''
set -g @tmux_power_upload_speed_icon   '󰕒'
set -g @tmux_power_download_speed_icon '󰇚'
# 機能有効

#set -g status-left "#(~/tmux-powerline/powerline.sh left)"
#set -g status-right "#(~/tmux-powerline/powerline.sh right)"
set -g @tmux_power_show_upload_speed   true
set -g @tmux_power_show_download_speed true
set -g @tmux_power_show_web_reachable true


# プラグインの実行は必ず最後の行にこれを入れる。
run -b '~/.tmux/plugins/tpm/tpm'
