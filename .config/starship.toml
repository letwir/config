"$schema" = 'https://starship.rs/config-schema.json'

#[вЦСвЦТвЦУ](#a3aed2)\
#[ оЬС ](bg:#a3aed2 fg:#090c0c)\

format = """
$hostname\
[оВі](bg:#466fc0 fg:#a3aed2)\
(bg:#a3aed2 fg:#090c0c)\
$directory\
[оВі](fg:#466fc0 bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[оВі](fg:#212736 bg:#1d2230)\
$time\
$cmd_duration\
[оВі ](fg:#1d2230)\
$sudo\
\n$character"""

[cmd_duration]
show_milliseconds = true
format = '[[ пРЇ $duration ](fg:#a98888 bg:#1d2230)]($style)'
style = "fg:rosewater"
disabled = false
show_notifications = true
min_time_to_notify = 45000
min_time = 700

[hostname]
ssh_only = false
format = "[$os$hostname](bg:#a3aed2 fg:#090c0c)"
disabled = false

[directory]
style = "fg:#ffffff bg:#466fc0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оШИ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%H:%M:%S"
style = "bg:#1d2230"
format = '[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)'
