[build]
jobs = 8                      # number of parallel jobs, defaults to # of CPUs
rustflags = [
        "-C", "target-cpu=native",   # ネイティブCPU向けの最適化を有効化
        "-C", "llvm-args=-ffast-math", # 浮動小数点演算の高速化 (精度が犠牲になる可能性があります)
        "-C", "llvm-args=-fp-contract=fast", # FMA (積和演算) の結合をより積極的に行う
        #"-Cprofile-generate=/tmp/pgo-data"     # PGO (Profile-Guided Optimization)
        #"-Cprofile-use=/tmp/pgo-data" # PGO (Profile-Guided Optimization)
        # nightly
        "-Z", "mir-opt-level=4",           # MIR最適化を最大(通常は2)に引き上げる
        "-Z", "cross-crate-inline-threshold=100", # クレートを跨いだインライン化をより積極的に行う
        "-C", "llvm-args=-enable-dfa-jump-thread", # LLVMの決定性有限オートマトンベースのジャンプスレッドを有効化
]
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-Wl,--as-needed",
    "-C", "llvm-args=-align-all-functions=32",
    # Clang専用
    "-C", "link-arg=-fuse-ld=mold", #現代のマルチコアをフル活用する mold を使用。LTO（Link Time Optimization）のボトルネックを解消
    ]

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "target-feature=+lse",    # アトミック演算の強化
    # ARM Cortex-A72
    "-C target-feature=+lse", # ARMv8.1のLarge System Extensions (LSE) を有効化 (Cortex-A72での性能向上に寄与する可能性があります)
    ]
[profile.release]
lto = "thin"          # リンク時最適化を全モジュールで有効化 (コンパイル時間は増える)
codegen-units = 1    # コード生成単位を1にして最適化の余地を増やす
panic = "abort"      # パニック時にスタックトレースを生成しない (バイナリサイズ縮小、高速化)
strip = "symbols"    # デバッグシンボルを削除 (バイナリサイズ縮小)
opt-level = 3         #最大レベルの最適化を行います。

[cache]
auto-clean-frequency = "1 day"   # How often to perform automatic cache cleaning
